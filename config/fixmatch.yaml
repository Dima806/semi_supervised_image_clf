model:
  backbone: "resnet18"
  pretrained_simclr: null   # path to SimCLR checkpoint, or null for random init
  input_size: 64
  num_classes: 10

training:
  epochs: 200
  batch_size_labelled: 64
  batch_size_unlabelled: 192  # 1:3 labelled:unlabelled ratio
  learning_rate: 3.0e-2
  weight_decay: 5.0e-4
  momentum: 0.9
  ema_decay: 0.999
  threshold: 0.95             # pseudo-label confidence threshold
  lambda_u: 1.0               # weight of unsupervised loss
  warmup_epochs: 0

data:
  dataset: "stl10"
  data_dir: "data/"
  labels_per_class: 100       # 4 | 10 | 25 | 100 | 500
  random_seed: 42
  num_workers: 2

smoke_test:
  enabled: false
  max_labelled: 50
  max_unlabelled: 1000
  max_epochs: 2
