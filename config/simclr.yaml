model:
  backbone: "resnet18"
  projection_dim: 128
  input_size: 64

training:
  epochs: 100
  batch_size: 256
  temperature: 0.5
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 10

data:
  dataset: "stl10"
  data_dir: "data/"
  num_workers: 2

smoke_test:
  enabled: false
  max_labelled: 50
  max_unlabelled: 1000
  max_epochs: 2
