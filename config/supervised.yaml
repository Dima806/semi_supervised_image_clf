model:
  backbone: "resnet18"
  input_size: 64
  num_classes: 10

training:
  epochs: 100
  batch_size: 128
  learning_rate: 1.0e-2
  weight_decay: 5.0e-4
  momentum: 0.9
  lr_scheduler: "cosine"

data:
  dataset: "stl10"
  data_dir: "data/"
  labels_per_class: 500       # full labelled set
  random_seed: 42
  num_workers: 2

smoke_test:
  enabled: false
  max_labelled: 50
  max_epochs: 2
